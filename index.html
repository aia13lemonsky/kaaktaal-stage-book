let audioCtx = null;
function playClick(accent){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = accent ? 1500 : 950;
    gain.gain.setValueAtTime(0.16, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.06);
  }catch(e){ /* Web Audio unavailable — visual dots still work */ }
}
// Flashes the screen edges on a beat — an alternative to the dot row for a
// loud/bright stage where a small pulsing circle is easy to miss peripherally.
function triggerEdgeFlash(accent){
  const el = document.getElementById('edgeFlash');
  if(!el) return;
  el.classList.remove('flash-yellow', 'flash-accent');
  void el.offsetWidth; // force reflow so re-triggering mid-fade restarts the animation cleanly
  el.classList.add(accent ? 'flash-accent' : 'flash-yellow');
}
function timeSigBeats(timeSig){
  const m = String(timeSig||'4/4').match(/^(\d+)/);
  const n = m ? parseInt(m[1],10) : 4;
  if(!n || isNaN(n)) return 4;
  return Math.min(Math.max(n,2), 12);
}
function stopMetronome(){
  metro.running = false;
  if(metro.timerId) clearTimeout(metro.timerId);
  metro.timerId = null;
  metro.beatIndex = 0;
}
// setInterval reschedules relative to when the PREVIOUS callback actually
// ran, so any main-thread jank (a paint, a GC pause) makes every later beat
// drift later too — it never catches back up. This instead computes each
// beat's absolute target time from a fixed start reference and corrects the
// next setTimeout delay against the real clock every tick, so drift can't
// accumulate — this is what "sync with the metronome" actually needed.
function startMetronome(bpm, beats, dotEls){
  stopMetronome();
  const bpmNum = Number(bpm);
  if(!bpmNum || bpmNum <= 0) return; // no BPM set — stays still, per spec
  metro.running = true;
  metro.beatIndex = 0;
  const periodMs = 60000 / bpmNum;
  const start = performance.now();
  let beatCount = 0;
  const tick = () => {
    dotEls.forEach((d,i) => d.classList.toggle('on', i === metro.beatIndex));
    if(metro.soundOn) playClick(metro.beatIndex === 0);
    if(metro.flashOn) triggerEdgeFlash(metro.beatIndex === 0);
    metro.beatIndex = (metro.beatIndex + 1) % beats;
    beatCount++;
    if(!metro.running) return;
    const targetTime = start + beatCount * periodMs;
    metro.timerId = setTimeout(tick, Math.max(0, targetTime - performance.now()));
  };
  tick();
}

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<div class="resultCard"><h2>Reference track</h2>
      <div class="versionline" style="margin-bottom:12px;">${linkedName ? 'Linked: ' + escapeHtml(linkedName) : 'No track linked yet.'}</div>
      <div class="btnrow"><button class="btn primary" id="refChoose">${linkedName ? 'Choose a different file' : 'Choose a file'}</button></div>
      ${hasSegments ? '<div class="btnrow" style="margin-top:8px;"><button class="btn blue" style="flex:1;" id="refTimeline">Timeline (mark section start times)</button></div>' : ''}
      ${linkedName ? '<div class="btnrow" style="margin-top:8px;"><button class="btn danger" style="flex:1;" id="refRemove">Remove track</button></div>' : ''}
      <div class="btnrow" style="margin-top:8px;"><button class="btn ghost" id="refCancel">Cancel</button></div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.remove(); });
    overlay.querySelector('#refChoose').addEventListener('click', () => { overlay.remove(); refFileInput.click(); });
    overlay.querySelector('#refCancel').addEventListener('click', () => overlay.remove());
    const tl = overlay.querySelector('#refTimeline');
    if(tl) tl.addEventListener('click', () => { overlay.remove(); stopRef(); go('timeline', s.id); });
    const rm = overlay.querySelector('#refRemove');
    if(rm) rm.addEventListener('click', async () => {
      overlay.remove();
      if(refAudio.playing) stopRef();
      try{ await audioRemove(s.id); }catch(e){}
      delete songPref(s.id).audioName;
      delete songPref(s.id).loopStart;
      delete songPref(s.id).loopEnd;
      delete songPref(s.id).loopStartSeg;
      delete songPref(s.id).loopEndSeg;
      delete songPref(s.id).timeline;
      savePrefs();
      showToast('Track removed');
    });
  }
  refIcon();

  /* ---- full-screen lyric view ---- */
  const stageEl = app.querySelector('.stage');
  app.querySelector('#btnFS').addEventListener('click', (e) => {
    const fs = stageEl.classList.toggle('fs');
    e.currentTarget.classList.toggle('active', fs);
    try{
      if(fs && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
      else if(!fs && document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    }catch(err){ /* fullscreen API unavailable — CSS-only fullscreen still applies */ }
  });

  /* ---- per-song default speed & key ---- */
  const speedSlider = app.querySelector('#speedSlider');
  app.querySelector('#btnPrefSave').addEventListener('click', () => {
    const p = songPref(id);
    p.secPerLine = perf.secPerLine;
    p.semitone = perf.semitone;
    savePrefs();
    showToast("Saved as this song's default (speed + key)");
  });
  app.querySelector('#btnPrefRevert').addEventListener('click', () => {
    const p = (prefs.songs && prefs.songs[id]) || {};
    perf.secPerLine = p.secPerLine || 10;
    perf.semitone = (typeof p.semitone === 'number') ? p.semitone : 0;
    speedSlider.value = perf.secPerLine;
    speedVal.textContent = perf.secPerLine + 's/line';
    refreshChords();
    showToast('Back to default');
  });

  app.querySelector('#keyUp').addEventListener('click', () => { perf.semitone++; refreshChords(); });
  app.querySelector('#keyDown').addEventListener('click', () => { perf.semitone--; refreshChords(); });
  function refreshChords(){
    lyricsWrap.innerHTML = renderBody(s.body || '', perf.semitone);
    keyVal.textContent = transposeKeyLabel(s.key, perf.semitone);
    attachChordTaps();
    updateScrollProgress();
    // Replacing innerHTML wipes out the centering spacers (if a reference
    // track is active) along with everything else — rebuild them and the
    // scroll anchors they depend on against the fresh DOM.
    refreshIntervals();
  }

  app.querySelector('#fontUp').addEventListener('click', () => { perf.fontScale = Math.min(2, perf.fontScale + 0.1); applyFont(); });
  app.querySelector('#fontDown').addEventListener('click', () => { perf.fontScale = Math.max(0.7, perf.fontScale - 0.1); applyFont(); });
  function applyFont(){
    lyricsWrap.style.fontSize = (17 * perf.fontScale) + 'px';
    fontVal.textContent = Math.round(perf.fontScale*100) + '%';
    updateScrollProgress();
  }

  app.querySelector('#btnPlay').addEventListener('click', () => {
    // While a reference track is playing, this button no longer stops the
    // track (that's the dedicated top-bar note-icon button's job) — it just
    // pauses/resumes the lyrics FOLLOWING it, so the person can keep
    // listening without the scroll racing ahead or lagging behind.
    if(refAudio.playing){
      perf.refScrollPaused = !perf.refScrollPaused;
      playIcon.innerHTML = perf.refScrollPaused ? PLAY_SVG : PAUSE_SVG;
      return;
    }
    if(perf.scrolling){
      stopAutoscroll();
      playIcon.innerHTML = PLAY_SVG;
    } else {
      startAutoscroll(lyricsWrap);
      playIcon.innerHTML = PAUSE_SVG;
    }
  });
  // Speed changes apply live — the scroll loop reads perf.secPerLine every
  // frame, so dragging the slider never stops or restarts the scroll.
  speedSlider.addEventListener('input', e => {
    perf.secPerLine = Number(e.target.value);
    speedVal.textContent = perf.secPerLine + 's/line';
  });

  // While a finger is on the lyrics, auto-scroll follows the user instead of
  // fighting them, then resumes from wherever they let go. Only the pause
  // button (or leaving the view) actually stops it.
  let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
  lyricsWrap.addEventListener('touchstart', () => { perf.holdScroll = true; }, {passive:true});
  lyricsWrap.addEventListener('touchend', () => {
    perf.holdScroll = false;
    scrollAccum = lyricsWrap.scrollTop;
  }, {passive:true});
  lyricsWrap.addEventListener('touchcancel', () => {
    perf.holdScroll = false;
    scrollAccum = lyricsWrap.scrollTop;
  }, {passive:true});
  if(inSetlist){
    lyricsWrap.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      touchStartX = t.clientX; touchStartY = t.clientY; touchStartTime = Date.now();
    }, {passive:true});
    lyricsWrap.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      const dt = Date.now() - touchStartTime;
      if(Math.abs(dx) > 70 && Math.abs(dy) < 60 && dt < 700){
        goToSetlistSong(dx < 0 ? 1 : -1);
      }
    }, {passive:true});
  }
  function goToSetlistSong(direction){
    const newIndex = route.setlistIndex + direction;
    if(newIndex < 0){ showToast('First song in the set'); return; }
    if(newIndex >= inSetlist.songIds.length){ showToast('Last song in the set'); return; }
    go('perform', inSetlist.songIds[newIndex], {setlistId: inSetlist.id, setlistIndex: newIndex});
  }

  function attachChordTaps(){
    lyricsWrap.querySelectorAll('.seg[data-chord]').forEach(el => {
      el.addEventListener('click', (ev) => {
        ev.stopPropagation();
        openChordDiagram(el.dataset.chord);
      });
    });
  }
  attachChordTaps();

  if(inSetlist && route.setlistIndex === 0){
    showToast('Swipe left/right to move between songs in this set');
  }
}

/* ---------- TIMELINE EDIT ----------
   Lets the person mark, per {Section} in the lyrics, the moment it starts in
   the linked reference track — listening once, tapping each segment's row at
   the right instant. Purely a prefs.songs[id] concern (never touches song
   version); startAudioScroll()/the loop picker read the same timeline array
   back out at playback time. */
function tlRowHTML(seg, i, mark){
  return `
  <div class="tlrow" data-idx="${i}">
    <div class="tlmeta">
      <div class="tlname">${escapeHtml(seg.name)}</div>
      ${seg.guideLine ? `<div class="tlguide">${escapeHtml(seg.guideLine)}</div>` : ''}
    </div>
    <button type="button" class="btn ${mark ? 'blue' : 'primary'}" data-act="mark">${mark ? formatTime(mark.time) : 'Mark here'}</button>
  </div>`;
}
function renderTimeline(id){
  const s = songs.find(x => x.id === id);
  if(!s) return go('library');
  const segs = parseSegments(s.body || '');
  const p = songPref(id);
  if(!Array.isArray(p.timeline)) p.timeline = [];

  let el = null, url = null;
  function cleanup(){
    if(el){ try{ el.pause(); }catch(e){} }
    if(url) URL.revokeObjectURL(url);
  }

  app.innerHTML = `
    <div class="topbar">
      <button class="iconbtn back" id="btnBack">${icon('back')}</button>
      <h1>Timeline</h1>
      <div class="spacer"></div>
    </div>
    <div class="count">${escapeHtml(s.title)} &middot; tap a segment to mark it at the current position</div>
    ${segs.length === 0 ? emptyStateHTML('No {Section} markers in this song\'s lyrics yet.<br>Add some in the editor first.') : `
    <div class="refRow">
      <div class="refSeekRow">
        <span class="refTime" id="tlTimeCur">0:00</span>
        <input type="range" id="tlSeek" min="0" max="100" step="0.1" value="0" disabled>
        <span class="refTime" id="tlTimeDur">0:00</span>
      </div>
      <div class="btnrow">
        <button class="btn primary" id="tlPlayPause" disabled>Play</button>
      </div>
      <div class="btnrow" style="margin-top:6px;">
        <button class="btn blue" id="btnTlDone">Done</button>
      </div>
    </div>
    <div class="timelineList" id="timelineList">
      ${segs.map((seg, i) => tlRowHTML(seg, i, p.timeline[i])).join('')}
    </div>
    `}
  `;
  app.querySelector('#btnBack').addEventListener('click', () => { cleanup(); go('perform', id); });
  if(segs.length === 0) return;
  // Marks already save instantly per tap; Done is just the clear "I'm
  // finished, take me back to the lyrics" exit — to edit again later, long-
  // press the reference-track icon and pick Timeline from there.
  app.querySelector('#btnTlDone').addEventListener('click', () => { cleanup(); go('perform', id); });

  const tlSeek = app.querySelector('#tlSeek');
  const tlTimeCur = app.querySelector('#tlTimeCur');
  const tlTimeDur = app.querySelector('#tlTimeDur');
  const tlPlayPause = app.querySelector('#tlPlayPause');
  let seeking = false;

  function refreshRow(i){
    const btn = app.querySelector(`.tlrow[data-idx="${i}"] .btn`);
    if(!btn) return;
    const mark = p.timeline[i];
    btn.textContent = mark ? formatTime(mark.time) : 'Mark here';
    btn.classList.toggle('blue', !!mark);
    btn.classList.toggle('primary', !mark);
  }

  (async () => {
    let blob = null;
    try{ blob = await audioGet(id); }catch(e){}
    if(!blob){ showToast('No reference track linked yet'); return; }
    url = URL.createObjectURL(blob);
    el = new Audio(url);
    el.addEventListener('loadedmetadata', () => {
      tlSeek.max = el.duration || 0;
      tlSeek.disabled = false;
      tlPlayPause.disabled = false;
      tlTimeDur.textContent = formatTime(el.duration || 0);
    });
    el.addEventListener('timeupdate', () => {
      if(seeking) return;
      tlSeek.value = el.currentTime;
      tlTimeCur.textContent = formatTime(el.currentTime);
    });
    el.addEventListener('play', () => { tlPlayPause.textContent = 'Pause'; });
    el.addEventListener('pause', () => { tlPlayPause.textContent = 'Play'; });
    el.addEventListener('ended', () => { tlPlayPause.textContent = 'Play'; });
  })();

  tlSeek.addEventListener('input', () => {
    seeking = true;
    tlTimeCur.textContent = formatTime(Number(tlSeek.value));
  });
  tlSeek.addEventListener('change', () => {
    if(el) el.currentTime = Number(tlSeek.value);
    seeking = false;
  });
  tlPlayPause.addEventListener('click', () => {
    if(!el) return;
    if(el.paused) el.play(); else el.pause();
  });
  app.querySelectorAll('.tlrow').forEach(row => {
    row.querySelector('[data-act="mark"]').addEventListener('click', () => {
      if(!el) return;
      const i = Number(row.dataset.idx);
      p.timeline[i] = {time: el.currentTime};
      savePrefs();
      refreshRow(i);
      showToast(`${segs[i].name}: marked at ${formatTime(el.currentTime)}`);
    });
  });
}

function transposeKeyLabel(key, semitone){
  if(!key) return semitone === 0 ? '—' : (semitone>0?'+':'')+semitone;
  return transposeChord(key, semitone);
}
function openChordDiagram(chordName){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `<div class="diagramCard">${chordPopupHTML(chordName)}</div>`;
  overlay.addEventListener('click', () => overlay.remove());
  document.body.appendChild(overlay);
}

/* ---------- PWA: service worker + update prompt ---------- */
function initServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('sw.js').then(reg => {
    // A worker already sitting in "waiting" (e.g. install happened in a background tab).
    if(reg.waiting) showUpdateBar(reg);
    reg.addEventListener('updatefound', () => {
      const installing = reg.installing;
      if(!installing) return;
      installing.addEventListener('statechange', () => {
        if(installing.state === 'installed' && navigator.serviceWorker.controller){
          showUpdateBar(reg);
        }
      });
    });
  }).catch(()=>{ /* offline on first load with no cache yet — nothing to register against */ });

  // Reload once the new worker actually takes control, not the instant it's told to.
  let reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(reloaded) return;
    reloaded = true;
    window.location.reload();
  });
}
function showUpdateBar(reg){
  const bar = document.getElementById('updateBar');
  bar.classList.add('show');
  document.getElementById('btnUpdateNow').addEventListener('click', () => {
    if(reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
  }, {once:true});
}

/* ---------- PWA: install prompt ----------
   Chrome only fires beforeinstallprompt (and only shows its own automatic
   mini-infobar) based on its own engagement heuristics — it does NOT retrigger
   on every single visit, and there is no way for the page to force that. The
   reliable fix is to capture the event ourselves the moment it fires and show
   our own persistent banner instead of depending on the browser's built-in UI.
   iOS Safari has no such event at all — Apple gives web pages no install API,
   so that path is a plain instructional banner ("tap Share, then Add to Home
   Screen"), detected via user agent, with no button to click. */
let deferredInstallPrompt = null;
function isStandaloneDisplay(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOSDevice(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}
function showInstallBar(mode){
  if(isStandaloneDisplay() || sessionStorage.getItem('installBarDismissed') === '1') return;
  const bar = document.getElementById('installBar');
  const text = document.getElementById('installBarText');
  const btn = document.getElementById('btnInstallNow');
  if(mode === 'ios'){
    text.textContent = 'Install this app: tap Share, then "Add to Home Screen."';
    btn.classList.add('hidden');
  } else {
    text.textContent = 'Install this app for quick, offline access.';
    btn.classList.remove('hidden');
  }
  bar.classList.add('show');
}
function hideInstallBar(){
  document.getElementById('installBar').classList.remove('show');
}
function initInstallPrompt(){
  if(isStandaloneDisplay()) return; // already installed and running as the app — never nag
  document.getElementById('btnInstallDismiss').addEventListener('click', () => {
    sessionStorage.setItem('installBarDismissed', '1');
    hideInstallBar();
  });
  document.getElementById('btnInstallNow').addEventListener('click', async () => {
    if(!deferredInstallPrompt) return;
    hideInstallBar();
    deferredInstallPrompt.prompt();
    try{ await deferredInstallPrompt.userChoice; }catch(e){}
    deferredInstallPrompt = null;
  });
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    showInstallBar('android');
  });
  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    hideInstallBar();
  });
  if(isIOSDevice()) showInstallBar('ios');
}

/* ---------- boot ---------- */
try{ history.replaceState({view:'library'}, ''); }catch(e){}
window.addEventListener('popstate', (e) => {
  const st = e.state || {view:'library'};
  suppressPush = true;
  go(st.view || 'library', st.id, st);
  suppressPush = false;
});
// Keep the CSS fullscreen class in sync when the user exits via system UI/Esc.
document.addEventListener('fullscreenchange', () => {
  if(!document.fullscreenElement){
    const st = document.querySelector('.stage.fs');
    if(st){
      st.classList.remove('fs');
      const b = document.getElementById('btnFS');
      if(b) b.classList.remove('active');
    }
  }
});
// Thin scroll-position thumb for the library list — appears while scrolling,
// fades out, so you always know where you are in a long song list.
const scrollThumb = document.createElement('div');
scrollThumb.className = 'scrollThumb';
document.body.appendChild(scrollThumb);
let thumbFade = null;
window.addEventListener('scroll', () => {
  if(route.view !== 'library' && route.view !== 'reorder') return;
  const doc = document.documentElement;
  const max = doc.scrollHeight - doc.clientHeight;
  if(max <= 0) return;
  const h = Math.max(36, doc.clientHeight * doc.clientHeight / doc.scrollHeight);
  scrollThumb.style.height = h + 'px';
  scrollThumb.style.top = (doc.scrollTop / max * (doc.clientHeight - h)) + 'px';
  scrollThumb.classList.add('show');
  clearTimeout(thumbFade);
  thumbFade = setTimeout(() => scrollThumb.classList.remove('show'), 700);
}, {passive:true});

render();
initServiceWorker();
initInstallPrompt();
</script>
</body>
